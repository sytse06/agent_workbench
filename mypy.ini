[mypy]
python_version = 3.9
warn_return_any = False
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
ignore_missing_imports = True

[mypy.plugins.numpy.*]
follow_imports = skip

[mypy-langchain.*]
ignore_missing_imports = True

[mypy-langchain_core.*]
ignore_missing_imports = True

# Ignore TypedDict dict[str, Any] | None error that can't be fixed easily
[mypy-src.agent_workbench.services.mode_handlers]
disable_error_code = assignment
