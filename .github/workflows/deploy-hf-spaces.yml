name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  deploy-workbench:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install huggingface_hub toml

      - name: Deploy Workbench Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Create temporary deployment directory
          mkdir -p hf-deploy-workbench

          # Copy Space files
          cp -r deploy/hf-spaces/workbench/* hf-deploy-workbench/

          # Copy source code
          cp -r src/ hf-deploy-workbench/src/
          cp pyproject.toml hf-deploy-workbench/
          cp -r alembic/ hf-deploy-workbench/alembic/
          cp alembic.ini hf-deploy-workbench/
          cp -r config/ hf-deploy-workbench/config/

          # Generate requirements.txt from pyproject.toml
          cd hf-deploy-workbench

          # Extract dependencies from pyproject.toml using Python
          python3 -c "
import toml
import sys

# Read pyproject.toml
with open('pyproject.toml', 'r') as f:
    data = toml.load(f)

# Write requirements.txt
with open('requirements.txt', 'w') as f:
    f.write('# Generated from pyproject.toml for HuggingFace Spaces\n')

    # Main dependencies
    for dep in data['project']['dependencies']:
        f.write(dep + '\n')

print('✅ Generated requirements.txt from pyproject.toml')
"

          # Create Space if it doesn't exist, then deploy
          export HUGGING_FACE_HUB_TOKEN="$HF_TOKEN"
          hf repo create sytse06/agent-workbench-technical --repo-type=space --space_sdk=gradio --exist-ok || true
          hf upload sytse06/agent-workbench-technical . --repo-type=space

  deploy-seo-coach:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: deploy-workbench

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install huggingface_hub toml

      - name: Deploy SEO Coach Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Create temporary deployment directory
          mkdir -p hf-deploy-seo

          # Copy Space files
          cp -r deploy/hf-spaces/seo-coach/* hf-deploy-seo/

          # Copy source code
          cp -r src/ hf-deploy-seo/src/
          cp pyproject.toml hf-deploy-seo/
          cp -r alembic/ hf-deploy-seo/alembic/
          cp alembic.ini hf-deploy-seo/
          cp -r config/ hf-deploy-seo/config/

          # Generate requirements.txt from pyproject.toml
          cd hf-deploy-seo

          # Extract dependencies from pyproject.toml using Python
          python3 -c "
import toml
import sys

# Read pyproject.toml
with open('pyproject.toml', 'r') as f:
    data = toml.load(f)

# Write requirements.txt
with open('requirements.txt', 'w') as f:
    f.write('# Generated from pyproject.toml for HuggingFace Spaces\n')

    # Main dependencies
    for dep in data['project']['dependencies']:
        f.write(dep + '\n')

    # Add SEO-specific dependencies
    f.write('firecrawl-py>=0.0.8\n')

print('✅ Generated requirements.txt from pyproject.toml')
"

          # Create Space if it doesn't exist, then deploy
          export HUGGING_FACE_HUB_TOKEN="$HF_TOKEN"
          hf repo create sytse06/agent-workbench-seo-coach --repo-type=space --space_sdk=gradio --exist-ok || true
          hf upload sytse06/agent-workbench-seo-coach . --repo-type=space