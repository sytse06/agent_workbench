name: Continuous Integration Tests

on:
  push:
    branches: [main, develop]
    paths: ['src/**', 'tests/**', 'pyproject.toml', 'config/**']
  pull_request:
    branches: [main, develop]
    paths: ['src/**', 'tests/**', 'pyproject.toml', 'config/**']
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-type: [unit, integration, ui]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Cache UV dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync

      - name: Set up test environment
        run: |
          cp config/development.env .env
          # Replace API keys with test placeholders
          sed -i 's/sk-proj-.*/test_openai_key/g' .env
          sed -i 's/sk-ant-.*/test_anthropic_key/g' .env
          sed -i 's/sk-or-.*/test_openrouter_key/g' .env
          sed -i 's/fc-.*/test_firecrawl_key/g' .env

      - name: Run unit tests
        if: matrix.test-type == 'unit'
        run: |
          uv run pytest tests/unit/ -v --cov=src/agent_workbench \
            --cov-report=xml --cov-report=term-missing

      - name: Run integration tests
        if: matrix.test-type == 'integration'
        run: |
          uv run pytest tests/integration/ -v --cov=src/agent_workbench \
            --cov-report=xml --cov-report=term-missing

      - name: Run UI tests
        if: matrix.test-type == 'ui'
        run: |
          uv run pytest tests/ui/ -v --cov=src/agent_workbench \
            --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.test-type == 'unit'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv sync

      - name: Run code formatting check
        run: uv run black --check src/ tests/

      - name: Run linting
        run: uv run ruff check src/ tests/

      - name: Run type checking
        run: uv run mypy src/

  mode-factory-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mode: [workbench, seo_coach]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv sync

      - name: Set up test environment
        run: |
          cp config/development.env .env
          echo "APP_MODE=${{ matrix.mode }}" >> .env

      - name: Test mode factory interface creation
        run: |
          uv run python -c "
          import os
          os.environ['APP_MODE'] = '${{ matrix.mode }}'
          from src.agent_workbench.ui.mode_factory import ModeFactory
          factory = ModeFactory()
          try:
              interface = factory.create_interface('${{ matrix.mode }}')
              print(f'✓ Successfully created ${{ matrix.mode }} interface')
              assert interface is not None, 'Interface should not be None'
              print(f'✓ Interface validation passed for ${{ matrix.mode }}')
          except Exception as e:
              print(f'❌ Failed to create ${{ matrix.mode }} interface: {e}')
              raise
          "

  docker-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agent-workbench:test .

      - name: Run tests in Docker
        run: |
          docker run --rm \
            --env-file config/development.env \
            -e APP_ENV=test \
            agent-workbench:test \
            uv run pytest tests/ -v --tb=short

      - name: Test Docker workbench mode
        run: |
          docker run --rm \
            --env-file config/development.env \
            -e APP_MODE=workbench \
            -e APP_ENV=test \
            agent-workbench:test \
            uv run python -c "
            from src.agent_workbench.ui.mode_factory import ModeFactory
            factory = ModeFactory()
            interface = factory.create_interface('workbench')
            print('✓ Docker workbench mode test passed')
            "

      - name: Test Docker SEO coach mode
        run: |
          docker run --rm \
            --env-file config/development.env \
            -e APP_MODE=seo_coach \
            -e APP_ENV=test \
            agent-workbench:test \
            uv run python -c "
            from src.agent_workbench.ui.mode_factory import ModeFactory
            factory = ModeFactory()
            interface = factory.create_interface('seo_coach')
            print('✓ Docker SEO coach mode test passed')
            "

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  environment-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate environment files
        run: |
          # Check that all required environment files exist
          for env_file in config/development.env config/staging.env config/production.env; do
            if [ ! -f "$env_file" ]; then
              echo "❌ Missing environment file: $env_file"
              exit 1
            fi
            echo "✓ Found environment file: $env_file"
          done

          # Check required variables in each environment file
          required_vars=("APP_ENV" "DATABASE_URL" "DEFAULT_PRIMARY_MODEL")
          for env_file in config/*.env; do
            echo "Validating $env_file"
            for var in "${required_vars[@]}"; do
              if ! grep -q "^$var=" "$env_file"; then
                echo "❌ Missing required variable $var in $env_file"
                exit 1
              fi
            done
            echo "✓ $env_file validation passed"
          done

      - name: Check for sensitive data in config files
        run: |
          # Check that production.env uses placeholder patterns
          if grep -E "sk-proj-[a-zA-Z0-9]{48}" config/production.env; then
            echo "❌ Real OpenAI API key found in production.env"
            exit 1
          fi
          
          if grep -E "sk-ant-api03-[a-zA-Z0-9-]{95}" config/production.env; then
            echo "❌ Real Anthropic API key found in production.env"
            exit 1
          fi
          
          echo "✓ No sensitive data found in production config"

  build-summary:
    runs-on: ubuntu-latest
    needs: [test, quality, mode-factory-test, docker-test, security-scan, environment-validation]
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "## CI Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Test Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode Factory | ${{ needs.mode-factory-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Tests | ${{ needs.docker-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment Validation | ${{ needs.environment-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.test.result }}" == "success" && "${{ needs.quality.result }}" == "success" && "${{ needs.mode-factory-test.result }}" == "success" ]]; then
            echo "✅ All critical tests passed - Ready for deployment" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some tests failed - Review before deployment" >> $GITHUB_STEP_SUMMARY
          fi
