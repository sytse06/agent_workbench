name: CI - Essential Checks

on:
  push:
    branches: [main, develop]
    paths: ['src/**', 'tests/**', 'pyproject.toml']
  pull_request:
    branches: [main, develop]
    paths: ['src/**', 'tests/**', 'pyproject.toml']
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Cache UV dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync

      - name: Check code formatting
        run: uv run black --check src/ tests/

      - name: Run linting
        run: uv run ruff check src/ tests/

      - name: Run type checking
        run: uv run mypy src/

      - name: Set up test environment
        run: |
          cp config/development.env .env
          # Replace API keys with test placeholders
          sed -i 's/sk-proj-.*/test_openai_key/g' .env
          sed -i 's/sk-ant-.*/test_anthropic_key/g' .env
          sed -i 's/sk-or-.*/test_openrouter_key/g' .env
          sed -i 's/fc-.*/test_firecrawl_key/g' .env

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short

      - name: Validate environment files exist
        run: |
          for env_file in config/development.env config/staging.env config/production.env; do
            if [ ! -f "$env_file" ]; then
              echo "❌ Missing: $env_file"
              exit 1
            fi
          done
          echo "✅ All environment files present"

      - name: Summary
        if: always()
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Code quality checks passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Unit tests passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Environment validation passed" >> $GITHUB_STEP_SUMMARY
